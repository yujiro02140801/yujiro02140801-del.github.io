  <style>
    /* 準備中デザイン */
    .preparing-wrapper {
      width: 100%;
      padding: 80px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #faf7f2;
      border: 1px solid #e8e2da;
      border-radius: 12px;
      margin-top: 40px;
    }

    .preparing-inner {
      text-align: center;
      max-width: 600px;
    }

    .preparing-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: gentle-bounce 2.5s ease-in-out infinite;
    }

    .preparing-message {
      font-size: 1.2rem;
      line-height: 1.8;
      color: #6a5e55;
      font-family: 'Noto Serif JP', serif;
    }

    @keyframes gentle-bounce {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>

<body>
  <main class="gallery-page">

    <!-- Cinderella -->
    <section class="photo-gallery fade-section preparing" id="cinderella">

      <div class="preparing-wrapper">

          <p class="preparing-message">
            写真の準備を進めています。<br>
            準備が整い次第、こちらに公開いたします。<br>
            しばらくお待ちください。

        </div>
      </div>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Photo Gallery</title>
  <meta name="description" content="Wedding photo gallery at Disney Sea.">

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- favicon -->
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- OGP -->
  <meta property="og:title" content="Wedding Photo Gallery">
  <meta property="og:description" content="Our happiest memories.">
 <!-- <meta property="og:image" content="https://koha0923128-del.github.io/wedding-gallery/images/ogp.png">-->
  <meta property="og:url" content="https://koha0923128-del.github.io/wedding-gallery/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Yujiro & Marin Wedding">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <main class="gallery-page">

    <!-- Cinderella -->
    <section class="photo-gallery fade-section" id="cinderella">
      <div class="gallery-header">
        <h2 class="gallery-title">Wedding Photo Gallery</h2>

        <div class="gallery-info">
          <h3 class="gallery-theme">Cinderella</h3>
          <p class="gallery-date">2026.05.15</p>
        </div>
      </div>

      <div class="gallery-row gallery-row-wide infinite-carousel" role="region" aria-label="Cinderella wide photo carousel">
        <img src="images/最も打ち込んンだ活動写真_関西学院大学_中野真梨.jpg" alt="シンデレラ前撮り写真 1" class="gallery-image">
        <img src="images/marin.jpg" alt="シンデレラ前撮り写真 2" class="gallery-image">
        <img src="images/cinderella-wide-03.jpg" alt="シンデレラ前撮り写真 3" class="gallery-image">
        <img src="images/cinderella-wide-04.jpg" alt="シンデレラ前撮り写真 4" class="gallery-image">
        <img src="images/cinderella-wide-05.jpg" alt="シンデレラ前撮り写真 5" class="gallery-image">
        <img src="images/cinderella-wide-06.jpg" alt="シンデレラ前撮り写真 6" class="gallery-image">
        <img src="images/cinderella-wide-07.jpg" alt="シンデレラ前撮り写真 7" class="gallery-image">
        <img src="images/cinderella-wide-08.jpg" alt="シンデレラ前撮り写真 8" class="gallery-image">
        <img src="images/cinderella-wide-09.jpg" alt="シンデレラ前撮り写真 9" class="gallery-image">
        <img src="images/cinderella-wide-10.jpg" alt="シンデレラ前撮り写真 10" class="gallery-image">
        <img src="images/cinderella-wide-11.jpg" alt="シンデレラ前撮り写真 11" class="gallery-image">
        <img src="images/cinderella-wide-12.jpg" alt="シンデレラ前撮り写真 12" class="gallery-image">
        <img src="images/cinderella-wide-13.jpg" alt="シンデレラ前撮り写真 13" class="gallery-image">
      </div>

      <div class="gallery-row gallery-row-tall infinite-carousel" role="region" aria-label="Cinderella tall photo carousel">
        <img src="images/cinderella-tall-01.jpg" alt="シンデレラ縦写真 1" class="gallery-image">
        <img src="images/cinderella-tall-02.jpg" alt="シンデレラ縦写真 2" class="gallery-image">
        <img src="images/cinderella-tall-03.jpg" alt="シンデレラ縦写真 3" class="gallery-image">
        <img src="images/cinderella-tall-04.jpg" alt="シンデレラ縦写真 4" class="gallery-image">
      </div>
    </section>

    <!-- Glinda -->
    <section class="photo-gallery fade-section" id="glinda">
      <div class="gallery-header">

        <div class="gallery-info">
          <h3 class="gallery-theme">Glinda the good</h3>
          <p class="gallery-date">2026.05.15</p>
        </div>
      </div>

      <div class="gallery-row gallery-row-wide infinite-carousel" role="region" aria-label="Glinda wide photo carousel">
        <img src="images/glinda-wide-01.jpg" alt="グリンダ前撮り写真 1" class="gallery-image">
        <img src="images/glinda-wide-02.jpg" alt="グリンダ前撮り写真 2" class="gallery-image">
        <img src="images/glinda-wide-03.jpg" alt="グリンダ前撮り写真 3" class="gallery-image">
        <img src="images/glinda-wide-04.jpg" alt="グリンダ前撮り写真 4" class="gallery-image">
        <img src="images/glinda-wide-05.jpg" alt="グリンダ前撮り写真 5" class="gallery-image">
        <img src="images/glinda-wide-06.jpg" alt="グリンダ前撮り写真 6" class="gallery-image">
        <img src="images/glinda-wide-07.jpg" alt="グリンダ前撮り写真 7" class="gallery-image">
        <img src="images/glinda-wide-08.jpg" alt="グリンダ前撮り写真 8" class="gallery-image">
        <img src="images/glinda-wide-09.jpg" alt="グリンダ前撮り写真 9" class="gallery-image">
        <img src="images/glinda-wide-10.jpg" alt="グリンダ前撮り写真 10" class="gallery-image">
      </div>

      <div class="gallery-row gallery-row-tall infinite-carousel" role="region" aria-label="Glinda tall photo carousel">
        <img src="images/glinda-tall-01.jpg" alt="グリンダ縦写真 1" class="gallery-image">
        <img src="images/glinda-tall-02.jpg" alt="グリンダ縦写真 2" class="gallery-image">
        <img src="images/glinda-tall-03.jpg" alt="グリンダ縦写真 3" class="gallery-image">
        <img src="images/glinda-tall-04.jpg" alt="グリンダ縦写真 4" class="gallery-image">
        <img src="images/glinda-tall-05.jpg" alt="グリンダ縦写真 5" class="gallery-image">
        <img src="images/glinda-tall-06.jpg" alt="グリンダ縦写真 6" class="gallery-image">
        <img src="images/glinda-tall-07.jpg" alt="グリンダ縦写真 7" class="gallery-image">
        <img src="images/glinda-tall-08.jpg" alt="グリンダ縦写真 8" class="gallery-image">
        <img src="images/glinda-tall-09.jpg" alt="グリンダ縦写真 9" class="gallery-image">
      </div>
    </section>

  </main>

  <!-- footer -->
  <footer class="site-footer">
    <div class="site-footer-inner">
      <p class="site-footer-title">Yujiro &amp; Marin Wedding Gallery</p>
      <p class="site-footer-copy">Thank you for celebrating with us.</p>
    </div>
  </footer>

  <!-- lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="閉じる">×</button>
    <img class="lightbox-image" id="lightboxImage"
      src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
      alt="">
  </div>

  <script src="script.js"></script>
</body>
</html>
